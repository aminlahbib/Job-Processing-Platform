# NetworkPolicy: allow app namespace to reach data namespace (Postgres, RabbitMQ, Redis)
# and observability (optional). Deny other egress by default if needed.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: app-to-data
  namespace: app
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: data
      ports:
        - protocol: TCP
          port: 5432   # Postgres
        - protocol: TCP
          port: 5672   # RabbitMQ AMQP
        - protocol: TCP
          port: 6379   # Redis
    - to:
        - namespaceSelector:
            matchLabels:
              name: observability
      ports:
        - protocol: TCP
          port: 4318   # Jaeger OTLP HTTP
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: DNS
          port: 53
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 53
---
# Allow observability to scrape app namespace metrics (optional)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-observability-scrape
  namespace: app
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: observability
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9090
