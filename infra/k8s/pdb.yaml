# PodDisruptionBudgets — ensure minimum availability during voluntary disruptions (e.g. node drain)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-service-pdb
  namespace: app
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: job-coordinator-pdb
  namespace: app
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: job-coordinator
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: image-worker-pdb
  namespace: app
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: image-worker
---
apiVersion: policy/v1
