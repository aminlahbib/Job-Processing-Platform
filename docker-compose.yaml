# Job Processing Platform — Local Development
#
# Start everything:      docker compose up --build
# Infra only (run Go services with `go run` instead):
#                        docker compose up postgres rabbitmq
# With observability:    docker compose --profile observability up --build
# Stop + wipe volumes:   docker compose down -v

services:

  # ─────────────────────────────────────────────
  # Data tier
  # ─────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jpp
      POSTGRES_PASSWORD: jpp
      POSTGRES_DB: jpp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Runs automatically on first start to create the jobs table
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jpp"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI: http://localhost:15672
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────────
  # Application services
  # ─────────────────────────────────────────────

  api-service:
    build:
      context: .
      dockerfile: infra/docker/api-service.Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://jpp:jpp@postgres:5432/jpp?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  job-coordinator:
    build:
      context: .
      dockerfile: infra/docker/job-coordinator.Dockerfile
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    depends_on:
      rabbitmq:
        condition: service_healthy

  image-worker:
    build:
      context: .
      dockerfile: infra/docker/image-worker.Dockerfile
    environment:
      DATABASE_URL: postgres://jpp:jpp@postgres:5432/jpp?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  data-worker:
    build:
      context: .
      dockerfile: infra/docker/data-worker.Dockerfile
    environment:
      DATABASE_URL: postgres://jpp:jpp@postgres:5432/jpp?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  report-worker:
    build:
      context: .
      dockerfile: infra/docker/report-worker.Dockerfile
    environment:
      DATABASE_URL: postgres://jpp:jpp@postgres:5432/jpp?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # Observability (optional — start with:
  #   docker compose --profile observability up --build)
  # ─────────────────────────────────────────────

  jaeger:
    image: jaegertracing/all-in-one:1.57
    profiles: [observability]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI: http://localhost:16686
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP

  prometheus:
    image: prom/prometheus:v2.51.2
    profiles: [observability]
    volumes:
      - ./infra/k8s/observability/prometheus-compose.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"   # Prometheus UI: http://localhost:9090

  grafana:
    image: grafana/grafana:10.4.2
    profiles: [observability]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "3000:3000"   # Grafana: http://localhost:3000 (admin/admin)
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  grafana_data:
